name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3
      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Lancer les tests
        run: |
          pytest tests/test_app.py -v

  deploy:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3
      - name: Configurer AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
      - name: Login à Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mlops-retail-bank
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f cicd/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      - name: Mettre à jour le service ECS
        run: |
          aws ecs update-service --cluster MLOPS_RETAIL_BANK_Cluster --service mlops-catboost-service-5uem603i --force-new-deployment
